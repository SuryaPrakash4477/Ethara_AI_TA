# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect GitHub repo → apply

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
